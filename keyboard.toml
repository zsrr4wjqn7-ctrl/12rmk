# Documentation: https://rmk.rs/docs/configuration.html

[keyboard]
name = "RMK Keyboard"
product_name = "RMK Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
# 【关键修改】将芯片类型改为 nrf52840
chip = "nrf52840"

[matrix]
# 【关键修改】nRF52840 的引脚通常命名为 P0_xx 或 P1_xx
# 请务必根据你的 PCB 原理图修改下面的引脚号！
row_pins = ["P0_13", "P0_14", "P0_15", "P0_16"]
col_pins = ["P0_17", "P0_18", "P0_19"]

# RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
# row2col = true

[layout]
rows = 4
cols = 3
layers = 2
keymap = [
    # Layer 0
    [
        ["A", "B", "C"],
        ["Kc1", "Kc2", "Kc3"],
        ["LCtrl", "MO(1)", "LShift"],
        ["OSL(1)", "LT(2, Kc9)", "LM(1, LShift | LGui)"]
    ],
    # Layer 1
    [
        ["_", "TT(1)", "TG(2)"],
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"]
    ],
]
